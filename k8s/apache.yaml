apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: musicstore-albums-pvc
  namespace: musicstore
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: musicstore-apache
  namespace: musicstore
spec:
  selector:
    app: musicstore-apache
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: musicstore-apache
  namespace: musicstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: musicstore-apache
  template:
    metadata:
      labels:
        app: musicstore-apache
    spec:
      containers:
        - name: apache
          image: your-registry/apache-apache:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: musicstore-app-config
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: musicstore-postgres-secret
                  key: postgres_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: musicstore-postgres-secret
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: musicstore-postgres-secret
                  key: postgres_password
          volumeMounts:
            - name: albums
              mountPath: /opt/albums
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: albums
          persistentVolumeClaim:
            claimName: musicstore-albums-pvc
