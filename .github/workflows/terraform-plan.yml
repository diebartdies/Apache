name: Terraform

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform-plan.yml
  push:
    branches:
      - main
      - apache
    paths:
      - terraform/**
      - .github/workflows/terraform-plan.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        shell: bash
        working-directory: terraform

    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_db_password || 'ChangeMe123!' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format
        run: |
          set +e
          terraform fmt -check -recursive
          FMT_EXIT=$?
          set -e

          # terraform fmt exit semantics:
          # 0 => already formatted
          # 3 => files would be reformatted
          # others => real error
          if [ "$FMT_EXIT" -eq 0 ]; then
            echo "Terraform formatting is clean."
            exit 0
          fi

          if [ "$FMT_EXIT" -eq 3 ]; then
            echo "::warning::Terraform files need formatting, but CI will continue."
            terraform fmt -diff -recursive || true
            exit 0
          fi

          echo "terraform fmt failed (exit code: $FMT_EXIT)."
          exit "$FMT_EXIT"

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: |
          set +e
          terraform plan -input=false -no-color -detailed-exitcode
          PLAN_EXIT=$?
          set -e

          # detailed-exitcode semantics:
          # 0 => success, no changes
          # 2 => success, changes present
          # Some CI/provider combinations can surface 3 for "changes present" too.
          if [ "$PLAN_EXIT" -eq 0 ] || [ "$PLAN_EXIT" -eq 2 ] || [ "$PLAN_EXIT" -eq 3 ]; then
            echo "Terraform plan completed (exit code: $PLAN_EXIT)."
            exit 0
          fi

          echo "Terraform plan failed (exit code: $PLAN_EXIT)."
          exit "$PLAN_EXIT"

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/apache') && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
