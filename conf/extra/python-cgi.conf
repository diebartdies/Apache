# Enable CGI scripts (including Python)
LoadModule cgi_module modules/mod_cgi.so

<Directory "/usr/local/apache2/cgi-bin">
    AllowOverride None
    Options +ExecCGI -MultiViews +SymLinksIfOwnerMatch
    Require all granted

    AddHandler cgi-script .cgi .pl .py
</Directory>

# Allow CGI scripts to read the container's configured albums directory
PassEnv ALBUMS_DIR
