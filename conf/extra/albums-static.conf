# Serve album audio files directly from the mounted albums directory
# Container path: /opt/albums (mounted via compose.yaml)

Alias /albums/ "/opt/albums/"

<Directory "/opt/albums">
    AllowOverride None
    Options -Indexes +FollowSymLinks
    # Direct file access is intentionally blocked.
    # Media is served by the web app through signed, short-lived URLs on /media.
    Require all denied

    # Help browsers handle WAV playback
    AddType audio/wav .wav

    # Album cover images
    AddType image/jpeg .jpg .jpeg
</Directory>
