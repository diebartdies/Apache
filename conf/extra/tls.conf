# TLS/SSL configuration (self-signed cert generated in the image)

LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so

Listen 443

SSLRandomSeed startup builtin
SSLRandomSeed connect builtin

<VirtualHost _default_:443>
    ServerName localhost

    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/conf/tls/server.crt"
    SSLCertificateKeyFile "/usr/local/apache2/conf/tls/server.key"

    # Keep the same behavior as the non-TLS server:
    # - /cgi-bin/ served by CGI
    # - everything else reverse-proxied to web.py
    # - /albums served by Alias in albums-static.conf
</VirtualHost>
