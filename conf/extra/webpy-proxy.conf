# Reverse proxy to the local Python web.py app running inside the same container
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

ProxyRequests Off
ProxyPreserveHost On

# Attach browser-like headers to proxied requests (skip CGI/static)
RequestHeader set Upgrade-Insecure-Requests "1" "expr=%{REQUEST_URI} !~ m#^/cgi-bin/#"
RequestHeader set User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/143.0.0.0 Safari/537.36" "expr=%{REQUEST_URI} !~ m#^/cgi-bin/#"

# Keep CGI working (optional)
ProxyPass /cgi-bin/ !

# Serve static assets (logo, etc.) directly from Apache htdocs
ProxyPass /ormet.jpeg !
ProxyPass /Webback.jpg !

ProxyPass / http://127.0.0.1:9000/
ProxyPassReverse / http://127.0.0.1:9000/
