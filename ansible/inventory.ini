[local]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[apache]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3 apache_container=apache-httpd

[myhosts]
192.168.1.7 ansible_shell_type=powershell ansible_shell_executable=powershell.exe
192.168.1.8
192.168.1.30

[myhosts:vars]
ansible_connection=ssh
ansible_port=22
ansible_user=Administrator
ansible_ssh_private_key_file=/root/.ssh/ansible_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5'
